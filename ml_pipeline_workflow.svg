<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <!-- Title -->
  <text x="600" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    Credit Risk ML Pipeline
  </text>
  
  <!-- Define gradient for boxes -->
  <defs>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1abc9c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Stage 1: Raw Data -->
  <rect x="20" y="80" width="140" height="100" rx="10" fill="url(#boxGradient1)" stroke="#2980b9" stroke-width="2"/>
  <text x="90" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">📊 Raw Data</text>
  <text x="90" y="140" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">2.26M loans</text>
  <text x="90" y="155" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">151 features</text>
  <text x="90" y="170" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">588K missing</text>
  
  <!-- Arrow 1 -->
  <path d="M 160 130 L 190 130" stroke="#34495e" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="175" y="120" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Week 1</text>
  
  <!-- Stage 2: Data Cleaning -->
  <rect x="190" y="80" width="140" height="100" rx="10" fill="url(#boxGradient2)" stroke="#c0392b" stroke-width="2"/>
  <text x="260" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">🧹 Cleaning</text>
  <text x="260" y="140" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Drop 56 cols</text>
  <text x="260" y="155" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Imputation</text>
  <text x="260" y="170" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">0 missing ✓</text>
  
  <!-- Arrow 2 -->
  <path d="M 330 130 L 360 130" stroke="#34495e" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="345" y="120" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Week 2</text>
  
  <!-- Stage 3: Feature Engineering -->
  <rect x="360" y="80" width="140" height="100" rx="10" fill="url(#boxGradient3)" stroke="#27ae60" stroke-width="2"/>
  <text x="430" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">⚙️ Feature Eng</text>
  <text x="430" y="133" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Leakage audit</text>
  <text x="430" y="148" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">FICO binning</text>
  <text x="430" y="163" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Interactions</text>
  
  <!-- Arrow 3 -->
  <path d="M 500 130 L 530 130" stroke="#34495e" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="515" y="120" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Week 3</text>
  
  <!-- Stage 4: Train/Test Split -->
  <rect x="530" y="80" width="140" height="100" rx="10" fill="url(#boxGradient4)" stroke="#e67e22" stroke-width="2"/>
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">✂️ Split Data</text>
  <text x="600" y="133" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">80% Train</text>
  <text x="600" y="148" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">20% Test</text>
  <text x="600" y="163" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Stratified</text>
  
  <!-- Arrow 4 -->
  <path d="M 670 130 L 700 130" stroke="#34495e" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="685" y="120" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Week 4</text>
  
  <!-- Stage 5: Models -->
  <rect x="700" y="80" width="140" height="100" rx="10" fill="url(#boxGradient5)" stroke="#8e44ad" stroke-width="2"/>
  <text x="770" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">🤖 Models</text>
  <text x="770" y="133" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Logistic Reg</text>
  <text x="770" y="148" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Random Forest</text>
  <text x="770" y="163" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">XGBoost</text>
  
  <!-- Arrow 5 -->
  <path d="M 840 130 L 870 130" stroke="#34495e" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="855" y="120" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Week 5</text>
  
  <!-- Stage 6: Evaluation -->
  <rect x="870" y="80" width="140" height="100" rx="10" fill="url(#boxGradient6)" stroke="#16a085" stroke-width="2"/>
  <text x="940" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">📈 Evaluation</text>
  <text x="940" y="133" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">ROC-AUC</text>
  <text x="940" y="148" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Precision/Recall</text>
  <text x="940" y="163" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Feature Imp</text>
  
  <!-- Arrow 6 -->
  <path d="M 1010 130 L 1040 130" stroke="#34495e" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1025" y="120" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Week 6</text>
  
  <!-- Stage 7: Business Impact -->
  <rect x="1040" y="80" width="140" height="100" rx="10" fill="url(#boxGradient7)" stroke="#2c3e50" stroke-width="2"/>
  <text x="1110" y="105" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">💼 Business</text>
  <text x="1110" y="125" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Impact</text>
  <text x="1110" y="148" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">$2-5M revenue</text>
  <text x="1110" y="163" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Risk mitigation</text>
  
  <!-- Bottom Timeline -->
  <line x1="20" y1="220" x2="1180" y2="220" stroke="#bdc3c7" stroke-width="2"/>
  
  <!-- Timeline markers -->
  <circle cx="90" cy="220" r="5" fill="#3498db"/>
  <text x="90" y="245" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e" font-weight="bold">Week 1</text>
  <text x="90" y="260" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">EDA</text>
  
  <circle cx="260" cy="220" r="5" fill="#e74c3c"/>
  <text x="260" y="245" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e" font-weight="bold">Week 2</text>
  <text x="260" y="260" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Cleaning</text>
  
  <circle cx="430" cy="220" r="5" fill="#2ecc71"/>
  <text x="430" y="245" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e" font-weight="bold">Week 3-4</text>
  <text x="430" y="260" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Engineering</text>
  
  <circle cx="600" cy="220" r="5" fill="#f39c12"/>
  <text x="600" y="245" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e" font-weight="bold">Week 4</text>
  <text x="600" y="260" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Split</text>
  
  <circle cx="770" cy="220" r="5" fill="#9b59b6"/>
  <text x="770" y="245" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e" font-weight="bold">Week 5</text>
  <text x="770" y="260" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Modeling</text>
  
  <circle cx="940" cy="220" r="5" fill="#1abc9c"/>
  <text x="940" y="245" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e" font-weight="bold">Week 6</text>
  <text x="940" y="260" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Evaluation</text>
  
  <circle cx="1110" cy="220" r="5" fill="#34495e"/>
  <text x="1110" y="245" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e" font-weight="bold">Week 7</text>
  <text x="1110" y="260" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Insights</text>
  
  <!-- Progress indicator -->
  <rect x="20" y="290" width="1160" height="30" rx="15" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
  <rect x="20" y="290" width="290" height="30" rx="15" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="600" y="310" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#34495e">
    Current Progress: Week 2 Complete (25%) ✅ → Week 3 In Progress 🔄
  </text>
  
  <!-- Key metrics box -->
  <rect x="20" y="340" width="1160" height="50" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="40" y="365" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">📊 Key Stats:</text>
  <text x="150" y="365" font-family="Arial, sans-serif" font-size="12" fill="#34495e">2.26M Loans</text>
  <text x="280" y="365" font-family="Arial, sans-serif" font-size="12" fill="#34495e">15.68% Default Rate</text>
  <text x="440" y="365" font-family="Arial, sans-serif" font-size="12" fill="#34495e">95 Features</text>
  <text x="560" y="365" font-family="Arial, sans-serif" font-size="12" fill="#34495e">7.5x FICO Risk Spread</text>
  <text x="730" y="365" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">Target: 85% AUC</text>
  <text x="890" y="365" font-family="Arial, sans-serif" font-size="12" fill="#2ecc71" font-weight="bold">Impact: $2-5M Revenue</text>
  
  <text x="40" y="382" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">🎯 Domain: 10+ years fintech experience</text>
  <text x="320" y="382" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">🔧 Tech: Python, Pandas, Scikit-learn</text>
  <text x="600" y="382" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">🎓 Learning: MS Business Analytics @ Rutgers</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#34495e" />
    </marker>
  </defs>
</svg>
